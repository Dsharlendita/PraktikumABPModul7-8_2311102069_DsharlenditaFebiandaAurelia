<!DOCTYPE html>
<html>
    <head>
        <title>Data Mahasiswa</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
        <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
        <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
        <link rel="stylesheet" href="css/style.css">
    </head>
    <body>
        <nav class="navbar navbar-expand-lg">
            <div class="container">
                <span class="navbar-brand fw-bold">Data Mahasiswa</span>
                <a href="index.html" class="btn btn-dark btn-sm">Tambah</a>
            </div>
        </nav>
        <section class="section">
            <div class="container">
                <div class="card-custom">
                    <h4 class="title mb-3">Daftar Mahasiswa</h4>

                    <table id="tabel" class="table table-hover"></table>
                </div>
            </div>
        </section>
        <script>
        $(document).ready(function(){
            $('#tabel').DataTable({
                ajax: {
                    url: "http://localhost:3000/mahasiswa",
                    dataSrc: ""
                },
                columns: [
                    {title:"NIM", data:"nim"},
                    {title:"Nama", data:"nama"},
                    {title:"Jurusan", data:"jurusan"},
                    {
                        title:"Kelola",
                        data:null, 
                        render:function(data){
                            return `
                            <button class="btn-edit edit" data-id="${data.nim}">
                                <i class="bi bi-pencil"></i>
                            </button>

                            <button class="btn-delete delete" data-id="${data.nim}">
                                <i class="bi bi-trash"></i>
                            </button>
                            `;
                        }
                    }
                ],
                columnDefs: [
                    { orderable: false, targets: 3 } // ⬅️ MATIKAN SORTING DI KOLOM AKSI
                ]
            });

            $('#tabel').on('click','.delete',function(){
                let nim = $(this).data('id');
                if(confirm("Yakin hapus?")){
                    $.ajax({
                        url: "http://localhost:3000/mahasiswa/" + nim,
                        method: "DELETE",
                        success: function(){
                            location.reload();
                        }
                    });
                }
            });

            $('#tabel').on('click','.edit',function(){
                let nim = $(this).data('id');
                window.location.href = "edit.html?nim=" + nim;
            });
        });
        </script>
    </body>
</html>
