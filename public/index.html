<!DOCTYPE html>
<html>
    <head>
        <title>Input Mahasiswa</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
        <link rel="stylesheet" href="css/style.css">
    </head>
    <body>
        <nav class="navbar navbar-expand-lg">
            <div class="container">
                <span class="navbar-brand fw-bold">Data Mahasiswa</span>
                <a href="data.html" class="btn btn-dark btn-sm">Lihat Data</a>
            </div>
        </nav>

        <section class="section">
            <div class="container">
                <div class="col-md-6 mx-auto">
                    <div class="card-custom">
                        <h4 class="title mb-3">Input Mahasiswa</h4>

                        <form id="form">
                            <input class="form-control mb-3" id="nim" placeholder="NIM" required>
                            <input class="form-control mb-3" id="nama" placeholder="Nama" required>
                            <input class="form-control mb-3" id="jurusan" placeholder="Jurusan" required>

                            <button class="btn btn-dark btn-custom w-100">
                                Simpan Data
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </section>

        <script>
        $("#form").submit(function(e){
            e.preventDefault();

            let data = {
                nim: $("#nim").val(),
                nama: $("#nama").val(),
                jurusan: $("#jurusan").val()
            };

            $.ajax({
                url: "http://localhost:3000/mahasiswa",
                method: "POST",
                contentType: "application/json",
                data: JSON.stringify(data),
                success: function(){
                    alert("Data berhasil disimpan");
                    $("#form")[0].reset();
                }
            });
        });
        </script>
    </body>
</html>
