<!DOCTYPE html>
<html>
    <head>
        <title>Edit Mahasiswa</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
        <link rel="stylesheet" href="css/style.css">
    </head>
    <body>
        <nav class="navbar">
            <div class="container">
                <span class="navbar-brand fw-bold">Data Mahasiswa</span>
                <a href="data.html" class="btn btn-dark btn-sm">Kembali</a>
            </div>
        </nav>

        <section class="section">
            <div class="container">
                <div class="col-md-6 mx-auto">
                    <div class="card-custom">
                        <h4 class="title mb-3">Edit Mahasiswa</h4>

                        <form id="form">
                            <input class="form-control mb-3" id="nim" readonly>
                            <input class="form-control mb-3" id="nama">
                            <input class="form-control mb-3" id="jurusan">

                            <button class="btn btn-dark btn-custom w-100">
                                Update Data
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </section>
        
        <script>
        const nim = new URLSearchParams(window.location.search).get('nim');

        $.get("http://localhost:3000/mahasiswa", function(data){
            let m = data.find(x => x.nim === nim);
            $("#nim").val(m.nim);
            $("#nama").val(m.nama);
            $("#jurusan").val(m.jurusan);
        });

        $("#form").submit(function(e){
            e.preventDefault();

            $.ajax({
                url: "http://localhost:3000/mahasiswa/" + nim,
                method: "PUT",
                contentType: "application/json",
                data: JSON.stringify({
                    nim: $("#nim").val(),
                    nama: $("#nama").val(),
                    jurusan: $("#jurusan").val()
                }),
                success: function(){
                    alert("Data berhasil diupdate");
                    window.location.href = "data.html";
                }
            });
        });
        </script>
    </body>
</html>
